spring:
  application:
    name: spring-ai-2-14days
  ai:
    # ===== 对话模型：DeepSeek =====
    deepseek:
      # 启动前先 export DEEPSEEK_API_KEY=sk-xxx
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        model: deepseek-chat        # 通用对话；深度推理用 deepseek-reasoner
        temperature: 0.7

    # ===== 嵌入模型 =====
    # 用本地 ONNX Transformers，无需任何配置，首次启动会自动下载模型（约 100MB+，需联网一次）

    # ===== MCP 客户端（Day13）=====
    # 默认不连接任何 MCP server。需要演示时取消下面注释，并确保本机已装 npx。
    # mcp:
    #   client:
    #     type: SYNC
    #     stdio:
    #       connections:
    #         filesystem:
    #           command: npx
    #           args:
    #             - "-y"
    #             - "@modelcontextprotocol/server-filesystem"
    #             - "/tmp"

logging:
  level:
    org.springframework.ai: INFO
